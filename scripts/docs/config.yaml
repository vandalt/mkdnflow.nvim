# Configuration options organized by group
# Each option has: name, type, description

modules:
  - name: modules.bib
    type: boolean
    description: |
      **`true`** (default): `bib` module is enabled (required for parsing `.bib` files and following citations).
      `false`: Disable `bib` module functionality.

  - name: modules.buffers
    type: boolean
    description: |
      **`true`** (default): `buffers` module is enabled (required for backward and forward navigation through buffers).
      `false`: Suppress `buffers` keybindings. Note: This is a core module and is always loaded internally because other modules depend on it. Setting this to `false` only disables its keybindings.

  - name: modules.conceal
    type: boolean
    description: |
      **`true`** (default): `conceal` module is enabled (required if you wish to enable link concealing. This does not automatically enable conceal behavior; see `links.conceal`.)
      `false`: Disable `conceal` module functionality.

  - name: modules.cursor
    type: boolean
    description: |
      **`true`** (default): `cursor` module is enabled (required for cursor movements: jumping to links, headings, etc.).
      `false`: Suppress `cursor` keybindings. Note: This is a core module and is always loaded internally because other modules depend on it. Setting this to `false` only disables its keybindings.

  - name: modules.folds
    type: boolean
    description: |
      **`true`** (default): `folds` module is enabled (required for section folding).
      `false`: Disable `folds` module functionality.

  - name: modules.foldtext
    type: boolean
    description: |
      **`true`** (default): `foldtext` module is enabled (required for prettified foldtext).
      `false`: Disable `foldtext` module functionality.

  - name: modules.links
    type: boolean
    description: |
      **`true`** (default): `links` module is enabled (required for creating, destroying, and following links).
      `false`: Suppress `links` keybindings. Note: This is a core module and is always loaded internally because other modules depend on it. Setting this to `false` only disables its keybindings.

  - name: modules.lists
    type: boolean
    description: |
      **`true`** (default): `lists` module is enabled (required for working in and manipulating lists, etc.).
      `false`: Disable `lists` module functionality.

  - name: modules.to_do
    type: boolean
    description: |
      **`true`** (default): `to_do` module is enabled (required for manipulating to-do statuses/lists, toggling to-do items, to-do list sorting, etc.)
      `false`: Disable `to_do` module functionality.

  - name: modules.paths
    type: boolean
    description: |
      **`true`** (default): `paths` module is enabled (required for link interpretation, link following, etc.).
      `false`: Suppress `paths` keybindings. Note: This is a core module and is always loaded internally because other modules depend on it. Setting this to `false` only disables its keybindings.

  - name: modules.tables
    type: boolean
    description: |
      **`true`** (default): `tables` module is enabled (required for table management, navigation, formatting, etc.).
      `false`: Disable `tables` module functionality.

  - name: modules.templates
    type: boolean
    description: |
      **`true`** (default): `templates` module is enabled (required for new-file template formatting and injection when following links to non-existent files).
      `false`: Disable `templates` module functionality. Template injection will be skipped even if `new_file_template.enabled` is `true`.

  - name: modules.yaml
    type: boolean
    description: |
      `true`: `yaml` module is enabled (required for parsing yaml headers).
      **`false`** (default): Disable `yaml` module functionality.

  - name: modules.cmp
    type: boolean
    description: |
      `true`: `cmp` module is enabled (required if you wish to enable completion for `nvim-cmp`).
      **`false`** (default): Disable `cmp` module functionality.

  - name: modules.notebook
    type: boolean
    description: |
      **`true`** (default): `notebook` module is enabled. Provides shared cross-file primitives for scanning notebook files, headings, and links. This module has zero cost at load time (no autocommands, keymaps, or side effects) and serves as infrastructure for other features.
      `false`: Disable `notebook` module functionality.

  - name: modules.backlinks
    type: boolean
    description: |
      **`true`** (default): `backlinks` module is enabled. Provides a side panel showing all files in the notebook that link to the current file. Requires the `notebook` module.
      `false`: Disable `backlinks` module functionality.

create_dirs:
  - name: create_dirs
    type: boolean
    description: |
      **`true`** (default): Directories referenced in a link will be (recursively) created if they do not exist.
      `false`: No action will be taken when directories referenced in a link do not exist. Neovim will open a new file, but you will get an error when you attempt to write the file.

path_resolution:
  - name: path_resolution.primary
    type: string
    description: |
      **`'first'`** (default): Links will be interpreted relative to the first-opened file (when the current instance of Neovim was started).
      `'current'`: Links will always be interpreted relative to the current file.
      `'root'`: Links will be always interpreted relative to the root directory of the current notebook (requires `path_resolution.root_marker` to be specified).
      Previously named `perspective.priority`.

  - name: path_resolution.fallback
    type: string
    description: |
      `'first'`: (see above)
      **`'current'`** (default): (see above)
      `'root'`: (see above)

  - name: path_resolution.root_marker
    type: string | boolean
    description: |
      **`false`** (default): The plugin does not look for the notebook root.
      `string`: The name of a file (not a full path) by which a notebook's root directory can be identified. For instance, `'.root'` or `'index.md'`.
      Previously named `perspective.root_tell`.

  - name: path_resolution.sync_cwd
    type: boolean
    description: |
      `true`: Changes in path resolution will be reflected in the nvim working directory. (In other words, the working directory will sync with the plugin's path resolution.) This helps ensure (at least) that path completions (if using a completion plugin with support for paths) will be accurate and usable.
      **`false`** (default): Neovim's working directory will not be affected by Mkdnflow.
      Previously named `perspective.nvim_wd_heel`.

  - name: path_resolution.update_on_navigate
    type: boolean
    description: |
      `true`: Path resolution will be updated when following a link to a file in a separate notebook/wiki (or navigating backwards to a file in another notebook/wiki).
      **`false`** (default): Path resolution will be not updated when following a link to a file in a separate notebook/wiki. (Links in the file in the separate notebook/wiki will be interpreted relative to the original notebook/wiki.)
      Previously named `perspective.update`.

filetypes:
  - name: filetypes.markdown
    type: boolean
    description: |
      **`true`** (default): The plugin activates for files with the `markdown` filetype (includes `.md`, `.markdown`, `.mkd`, `.mkdn`, `.mdwn`, `.mdown` extensions).
      `false`: The plugin does not activate for markdown files.

  - name: filetypes.rmd
    type: boolean
    description: |
      **`true`** (default): The plugin activates for files with the `rmd` filetype (`.rmd` extension).
      `false`: The plugin does not activate for R Markdown files.

  - name: filetypes.<name>
    type: boolean | string
    description: |
      Custom filetype/extension configuration:

      - `true`: If Neovim recognizes this as an extension (e.g., `md`), the detected filetype is used. Otherwise, the extension is auto-registered as its own filetype (e.g., `wiki = true` registers `.wiki` files as filetype `wiki`).
      - `'filetype'` (string): Register this extension as the specified filetype. Example: `txt = 'markdown'` makes `.txt` files activate mkdnflow and be treated as markdown.
      - `false`: Disable for this filetype/extension.

      Note: Old extension-based configs (e.g., `md = true`) are automatically migrated to filetype-based configs (e.g., `markdown = true`).

      Examples:
      ```lua
      filetypes = {
          markdown = true,      -- Standard (default)
          rmd = true,           -- Standard (default)
          wiki = true,          -- Auto-register .wiki as 'wiki' filetype
          txt = 'markdown',     -- Treat .txt files as markdown
      }
      ```

wrap:
  - name: wrap
    type: boolean
    description: |
      `true`: When jumping to next/previous links or headings, the cursor will continue searching at the beginning/end of the file.
      **`false`** (default): When jumping to next/previous links or headings, the cursor will stop searching at the end/beginning of the file.

on_attach:
  - name: on_attach
    type: "false | fun(bufnr: integer)"
    description: |
      A callback invoked each time mkdnflow activates on a buffer with a
      matching filetype. Receives the buffer number as its only argument.
      Fires regardless of whether `modules.maps` is enabled. When both are
      active, default mappings are set up first so the callback can override
      or delete them. See 'custom-mappings'.

      **`false`** (default): No callback.

bib:
  - name: bib.default_path
    type: string | nil
    description: |
      **`nil`** (default): No default/fallback bib file will be used to search for citation keys.
      `string`: A path to a default .bib file to look for citation keys in when attempting to follow a reference. The path need not be in the root directory of the notebook.

  - name: bib.find_in_root
    type: boolean
    description: |
      **`true`** (default): When `path_resolution.primary` is also set to `root` (and a root directory was found), the plugin will search for bib files to reference in the notebook's top-level directory. If `bib.default_path` is also specified, the default path will be added to the list of bib files found in the top-level directory so that it will also be searched.
      `false`: The notebook's root directory will not be searched for bib files.

silent:
  - name: silent
    type: boolean
    description: |
      `true`: The plugin will not display any messages in the console except compatibility warnings related to your config.
      **`false`** (default): The plugin will display messages to the console.

cursor:
  - name: cursor.jump_patterns
    type: table | nil
    description: |
      **`nil`** (default): Cursor jumping (`MkdnNextLink`/`MkdnPrevLink`) uses detection-based link finding, which reuses the same link detection system as `followLink()`. All recognized link types (markdown links, wiki links, auto links, reference links, citations, footnote refs with definitions) are automatically jumped to based on the configured `links.style`. Links inside fenced code blocks and inline code spans are skipped.
      `table`: A table of additional Lua regex patterns to jump to alongside detected links. Useful for non-link targets like `TODO` markers (e.g. `{ 'TODO', 'FIXME' }`).
      `{}` (empty table): No extra patterns; only detected links are jumped to (same as `nil`).

  - name: cursor.yank_register
    type: string
    description: |
      **`'"'`** (default): Anchor links are yanked to the unnamed register.
      `'+'`: Yank to the system clipboard.
      `'<any register>'`: Yank to any valid Vim register (e.g. `'a'`, `'*'`, `'0'`).

links:
  - name: links.style
    type: string
    description: |
      **`'markdown'`** (default): Links will be expected in the standard markdown format: `[<title>](<source>)`
      `'wiki'`: Links will be expected in the unofficial wiki-link style, specifically the title-after-pipe format: `[[<source>|<title>]]`.
      This sets the default style for link creation. To create links in both styles, you can override the style per-call via `:MkdnCreateLink wiki` (or `markdown`), or via the Lua API: `createLink({ style = 'wiki' })`. See 'custom-mappings-on-attach' for an example.

  - name: links.compact
    type: boolean
    description: |
      `true`: Wiki-style links will be created with the source and name being the same (e.g. `[[Link]]` will display as "Link" and go to a file named "Link.md").
      **`false`** (default): Wiki-style links will be created with separate name and source (e.g. `[[link-to-source|Link]]` will display as "Link" and go to a file named "link-to-source.md").
      Previously named `links.name_is_source`.

  - name: links.conceal
    type: boolean
    description: |
      `true`: Link sources and delimiters will be concealed (depending on which link style is selected).
      **`false`** (default): Link sources and delimiters will not be concealed by mkdnflow.

  - name: links.ref_hint
    type: boolean
    description: |
      `true`: When the cursor is on a reference-style link (`[text][ref]` or `[label]`), the resolved URL is shown as virtual text at the end of the line. When the cursor is on a reference definition line (`[ref]: url`), a usage count is shown instead. The virtual text uses the `MkdnflowRefHint` highlight group, which is linked to `Comment` by default. To customize its appearance, override the highlight group, e.g. `vim.api.nvim_set_hl(0, 'MkdnflowRefHint', { fg = '#88aaff', italic = true })`.
      **`false`** (default): No virtual text hints for reference links.

  - name: links.search_range
    type: integer
    description: |
      When following or jumping to links, consider `n` lines before and after a given line (useful if you ever permit links to be interrupted by a hard line break). Default: **`0`**.
      Previously named `links.context`.

  - name: links.implicit_extension
    type: string
    description: |
      A string that instructs the plugin (a) how to interpret links to files that do not have an extension, and (b) how to create new links from the text under the cursor or text selection.

      **`nil`** (default): Extensions will be explicit when a link is created and must be explicit in any notebook link.
      `'<any extension>'` (e.g. `'md'`): Links without an extension (e.g. `[Homepage](index)`) will be interpreted with the implicit extension (e.g. `index.md`), and new links will be created without an extension.

  - name: links.transform_on_create
    type: "fun(string): string | boolean"
    description: |
      `false`: No transformations are applied to the text to be turned into the name of the link source/path.
      **`fun(string): string`** (default): A function that transforms the text to be inserted as the source/path of a link when a link is created. Anchor links are not currently customizable. For an example, see the sample recipes beneath this table.
      Previously named `links.transform_explicit`.

  - name: links.transform_scope
    type: string
    description: |
      Controls which part of the link text is passed to `transform_on_create` when the text contains `/`.
      **`'path'`** (default): The entire text (including directory components) is passed to `transform_on_create`. For example, `work/with/dirs` is transformed as a single string, and the default transform produces `2026-02-15_work-with-dirs.md`.
      `'filename'`: Only the filename portion (after the last `/`) is passed to `transform_on_create`; the directory prefix is preserved. For example, `work/with/dirs` becomes `work/with/2026-02-15_dirs.md`.
      If the text contains no `/`, both modes behave identically.
      Can be overridden per-call via the Lua API: `createLink({ transform_scope = 'filename' })`, or via command argument: `:MkdnCreateLink filename`.

  - name: links.transform_on_follow
    type: "fun(string): string | boolean"
    description: |
      **`false`** (default): Do not perform any transformations on the link's source when following.
      `fun(string): string`: A function that transforms the path of a link immediately before interpretation. It does not transform the actual text in the buffer but can be used to modify link interpretation. For an example, see the sample recipe below.
      Previously named `links.transform_implicit`.

  - name: links.auto_create
    type: boolean
    description: |
      **`true`** (default): Try to create a link from the text under the cursor if there is no link under the cursor to follow.
      `false`: Do nothing if trying to follow a link and a link can't be found under the cursor.
      Previously named `links.create_on_follow_failure`.

  - name: links.on_create_new
    type: "false | fun(string, string|nil): string|nil"
    description: |
      A callback invoked when following a link to a file that does not yet exist,
      allowing file creation to be delegated to an external tool (e.g. `zk`,
      Obsidian CLI, a custom script). This callback is only invoked when the target
      file does not yet exist. Following a link to an existing file bypasses this
      callback entirely.

      The function receives two arguments: the full resolved path (with extension)
      that mkdnflow would create, and the link's display text (which may be `nil`).

      It should return a `string` (file path for mkdnflow to open) or `nil` (if the
      callback handled everything). If a path is returned and the file exists there,
      mkdnflow opens it directly (skipping template injection). If the file does not
      exist at the returned path, mkdnflow runs its normal creation flow.

      **`false`** (default): Use mkdnflow's built-in file creation.

  - name: links.edit_dirs
    type: "boolean | fun(path: string)"
    description: |
      Controls what happens when you follow a link that points to a directory
      rather than a file. This is useful when your notebook has subdirectories
      that you link to (e.g. `[recipes](recipes/)`) and you want your preferred
      file browser plugin to handle them instead of the default filename prompt.

      **`false`** (default): Prompt the user to type a filename within the directory.

      `true`: Run `:edit` on the directory, which triggers whatever
      directory-browsing plugin you have installed (netrw, oil.nvim, etc.).

      `fun(path: string)`: Call the supplied function with the absolute
      directory path. The return value is ignored. This is useful for file
      browsers that don't hook into `:edit` and need their own API call.

      In all non-default modes, the buffer stack is updated before the
      directory is opened, so `MkdnGoBack` will return you to the previous
      file.

      Example:
      ```lua
      -- Open directories with mini.files
      links = {
          edit_dirs = require('mini.files').open,
      }
      ```

  - name: links.uri_handlers
    type: "table<string, fun(uri: string, scheme: string, path: string, anchor: string|nil)|'system'>"
    description: |
      A table of custom URI scheme handlers, keyed by scheme name (without `://`).
      When following a link whose path starts with `<scheme>://`, the registered
      handler is called instead of the normal path classification. This is useful
      for custom protocols like `phd://`, `zotero://`, `obsidian://`, etc.

      Each value can be:

      - A **function** `fun(uri, scheme, path, anchor)` receiving the full URI
        (with anchor reattached), the scheme name, the path (without anchor), and
        the anchor (e.g. `'#section'`) or `nil`. The function has full control
        over what happens when the link is followed.
      - The string **`'system'`** to open the URI with the OS default handler
        (same as how `http://` URLs are opened).

      Standard schemes like `http` and `https` can also be overridden by
      registering a handler for them.

      **`{}`** (default): No custom URI scheme handlers are registered.

      Example:
      ```lua
      links = {
          uri_handlers = {
              phd = function(uri, scheme, path, anchor)
                  vim.fn.jobstart({ 'xdg-open', uri }, { detach = true })
              end,
              zotero = 'system',
          },
      }
      ```

footnotes:
  - name: footnotes.heading
    type: string | string[] | false
    description: |
      **`'## Footnotes'`** (default): When creating the first footnote in a document via `:MkdnCreateFootnote`, this heading is inserted at the end of the buffer before the footnote definition.
      A **string** sets a single-line ATX heading (e.g., `'### Notes'`).
      A **table** (array of strings) sets a multi-line heading, such as a setext-style heading: `{ 'Footnotes', '=========' }` or `{ 'Notes', '-----' }`.
      `false`: No heading is inserted; the definition is appended directly.

new_file_template:
  - name: new_file_template.enabled
    type: boolean
    description: |
      `true`: Use the new-file template when opening a new file by following a link.
      **`false`** (default): Don't use the new-file template when opening a new file by following a link.
      Previously named `new_file_template.use_template`.

  - name: new_file_template.placeholders
    type: "table<string, string|fun(ctx: table): string>"
    description: |
      A flat table whose keys are placeholder names mapped to one of:

      - A **function** `fun(ctx): string` — called with a context table containing all resolved built-in values. Available fields in `ctx`:
        - `link_title` — the display text of the link under the cursor, or `''`
        - `os_date` — today's date as `YYYY-MM-DD`
        - `source_file` — basename of the source file (e.g. `'index.md'`)
        - `filename` — stem of the new file being created, without extension (e.g. `'my-page'`)
        - `heading_context` — text of the nearest heading above the cursor (without `#` prefix), or `''`
      - A **magic string shorthand** — one of `'link_title'` or `'os_date'`, which resolves to the corresponding `ctx` value.
      - A **plain string literal** — used as-is (e.g., `author = 'Jake'`).

      All placeholders are resolved in a single pass before the new buffer is opened.

      Default: `{ title = 'link_title', date = 'os_date' }`

      **Deprecated:** The old nested format `{ before = {...}, after = {} }` is auto-migrated to this flat format. `placeholders.after` entries are merged in but all placeholders now resolve before the buffer switch.

  - name: new_file_template.template
    type: string
    description: |
      A string, optionally containing placeholder names, that will be inserted into a new file. Default: `'# {{ title }}'`

to_do:
  - name: to_do.create_on_toggle
    type: boolean
    description: |
      **`true`** (default): When toggling a line that is not already a to-do item, convert it into one (adding a checkbox to plain list items or wrapping plain text in `- [ ] `).
      `false`: Only rotate the status of existing to-do items. Lines without a checkbox are left unchanged. This is useful when mapping `MkdnToggleToDo` to a key like `<CR>` alongside other context-sensitive actions — the command becomes a no-op on non-to-do lines, allowing subsequent actions to fire instead.

  - name: to_do.highlight
    type: boolean
    description: |
      `true`: Apply highlighting to to-do status markers and/or content (as defined in `to_do.statuses[*].highlight`).
      **`false`** (default): Do not apply any highlighting.

  - name: to_do.status_propagation.up
    type: boolean
    description: |
      **`true`** (default): Update ancestor statuses (recursively) when a descendant status is changed or when a new to-do item is added to a list (e.g. a completed parent reverts to in-progress when a new uncompleted child is added). Updated according to logic provided in `to_do.statuses[*].propagate.up`.
      `false`: Ancestor statuses are not affected by descendant status changes or new item creation.

  - name: to_do.status_propagation.down
    type: boolean
    description: |
      **`true`** (default): Update descendant statuses (recursively) when an ancestor's status is changed. Updated according to logic provided in `to_do.statuses[*].propagate.down`.
      `false`: Descendant statuses are not affected by ancestor status changes.

  - name: to_do.sort_on_status_change
    type: boolean
    description: |
      `true`: Sort a to-do list when an item's status is changed.
      **`false`** (default): Leave all to-do items in their current position when an item's status is changed.
      Note: This will not apply if the to-do item's status is changed manually (i.e. by typing or pasting in the status marker).

  - name: to_do.sort.recursive
    type: boolean
    description: |
      `true`: `sort_on_status_change` applies recursively, sorting the host list of each successive parent until the root of the list is reached.
      **`false`** (default): `sort_on_status_change` only applies at the current to-do list level (not to the host list of the parent to-do item).

  - name: to_do.sort.cursor_behavior.track
    type: boolean
    description: |
      **`true`** (default): Move the cursor so that it remains on the same to-do item, even after a to-do list sort relocates the item.
      `false`: The cursor remains on its current line number, even if the to-do item is relocated by sorting.

  - name: to_do.statuses
    type: table (dict-like)
    description: |
      A dictionary of to-do statuses, keyed by status name (e.g. `'not_started'`, `'in_progress'`, `'complete'`). Each value is a table with the options described in the following rows. An arbitrary number of statuses can be defined. Users can partially override individual statuses — for example, overriding just the highlight of `not_started` while keeping all other defaults. See default statuses in the settings table.

  - name: to_do.statuses.<name>.marker
    type: string | table
    description: |
      The marker symbol to use for the status. The marker's string width must be 1.
      When provided as a string (e.g. `' '`), the string is used as both the recognized and written marker.
      When provided as a table (e.g. `{ 'X', 'x' }`), the first element is the **primary** marker — the one written to the buffer when the status is set. Any additional elements are **legacy** markers that will be recognized as belonging to this status when read from a file, but will be replaced with the primary marker on the next toggle. This is useful for accepting alternate symbols from other tools or conventions without losing compatibility.

  - name: to_do.statuses.<name>.highlight.marker
    type: table (highlight definition)
    description: |
      A table of highlight definitions to apply to a status marker, including brackets. See the `{val}` parameter of `:h nvim_set_hl` for possible options.

  - name: to_do.statuses.<name>.highlight.content
    type: table (highlight definition)
    description: |
      A table of highlight definitions to apply to the to-do item content (everything following the status marker). See the `{val}` parameter of `:h nvim_set_hl` for possible options.

  - name: to_do.statuses.<name>.sort.section
    type: integer
    description: |
      The integer should represent the linear section of the list in which items of this status should be placed when sorted. A section refers to a segment of a to-do list. If you want items with the `'in_progress'` status to be first in the list, you would set this option to `1` for the status.
      Note: Sections are not visually delineated in any way other than items with the same section number occurring on adjacent lines in the list.

  - name: to_do.statuses.<name>.sort.position
    type: string
    description: |
      Where in its assigned section a to-do item should be placed:
      `'top'`: Place a sorted item at the top of its corresponding section.
      `'bottom'`: Place a sorted item at the bottom of its corresponding section.
      `'relative'`: Maintain the current relative order of the sorted item whose status was just changed (vs. other list items).

  - name: to_do.statuses.<name>.propagate.up
    type: "fun(to_do_list): string | nil"
    description: |
      A function that accepts a to-do list instance and returns a valid to-do status name. The list passed in is the list that hosts the to-do item whose status was just changed. The return value should be the desired value of the parent. Return `nil` to leave the parent's status as is.

  - name: to_do.statuses.<name>.propagate.down
    type: "fun(to_do_list): string[]"
    description: |
      A function that accepts a to-do list instance and returns a list of valid to-do status names. The list passed in will be the child list of the to-do item whose status was just changed. Return `nil` or an empty table to leave the children's status as is.

  - name: to_do.status_order
    type: table (array-like)
    description: |
      An ordered list of status names that controls the toggle rotation order. When a to-do item is toggled, it cycles through the statuses in this order. A status defined in `to_do.statuses` but absent from `status_order` is still recognized when reading files, but excluded from toggle rotation (useful for statuses that should only be set via propagation).
      Replaces the deprecated `to_do.statuses[*].skip_on_toggle` option.

foldtext:
  - name: foldtext.object_count
    type: boolean
    description: |
      **`true`** (default): Show a count of all objects inside of a folded section.
      `false`: Do not show a count of any objects inside of a folded section.

  - name: foldtext.object_count_icon_set
    type: string | table
    description: |
      **`'emoji'`** (default): Use pre-defined emojis as icons for counted objects.
      `'plain'`: Use pre-defined plaintext UTF-8 characters as icons for counted objects.
      `'nerdfont'`: Use pre-defined nerdfont characters as icons for counted objects. Requires a nerdfont.
      `table<string, string>`: Use custom mapping of object names to icons.

  - name: foldtext.object_count_opts
    type: "fun(): table<string, table>"
    description: |
      A function that returns the options table defining the final attributes of the objects to be counted, including icons and counting methods. The pre-defined object types are `tbl`, `ul`, `ol`, `todo`, `img`, `fncblk`, `sec`, `par`, and `link`.

  - name: foldtext.line_count
    type: boolean
    description: |
      **`true`** (default): Show a count of the lines contained in the folded section.
      `false`: Don't show a line count.

  - name: foldtext.line_percentage
    type: boolean
    description: |
      **`true`** (default): Show the percentage of document (buffer) lines contained in the folded section.
      `false`: Don't show the percentage.

  - name: foldtext.word_count
    type: boolean
    description: |
      `true`: Show a count of the paragraph words in the folded section, ignoring words inside of other objects.
      **`false`** (default): Don't show a word count.

  - name: foldtext.title_transformer
    type: "fun(): fun(string): string"
    description: |
      A function that returns another function. The inner function accepts a string (the section heading text) and returns a potentially modified string.

  - name: foldtext.fill_chars.left_edge
    type: string
    description: |
      The character(s) to use at the very left edge of the foldtext. Default: `'⢾⣿⣿'`.

  - name: foldtext.fill_chars.right_edge
    type: string
    description: |
      The character(s) to use at the very right edge of the foldtext. Default: `'⣿⣿⡷'`

  - name: foldtext.fill_chars.item_separator
    type: string
    description: |
      The character(s) used to separate the items within a section. Default: `' · '`

  - name: foldtext.fill_chars.section_separator
    type: string
    description: |
      The character(s) used to separate adjacent sections. Default: `' ⣹⣿⣏ '`

  - name: foldtext.fill_chars.left_inside
    type: string
    description: |
      The character(s) used at the internal left edge of fill characters. Default: `' ⣹'`

  - name: foldtext.fill_chars.right_inside
    type: string
    description: |
      The character(s) used at the internal right edge of fill characters. Default: `'⣏ '`

  - name: foldtext.fill_chars.middle
    type: string
    description: |
      The character used to fill empty space in the foldtext line. Default: `'⣿'`

tables:
  - name: tables.type
    type: string
    description: |
      **`'pipe'`** (default): New tables are created in pipe format (`| cell | cell |` with `| --- | --- |` separator).
      `'grid'`: New tables are created in pandoc grid format with `+---+` border lines between rows and `+===+` header separators. Grid tables support native multiline cells.
      Regardless of this setting, existing tables are auto-detected and handled in their native format when formatting, navigating, or editing.

  - name: tables.trim_whitespace
    type: boolean
    description: |
      **`true`** (default): Trim extra whitespace from the end of a table cell when a table is formatted.
      `false`: Leave whitespace at the end of a table cell when formatting.

  - name: tables.format_on_move
    type: boolean
    description: |
      **`true`** (default): Format the table each time the cursor is moved to the next/previous cell/row using the plugin's API.
      `false`: Don't format the table when the cursor is moved.

  - name: tables.auto_extend_rows
    type: boolean
    description: |
      `true`: Add another row when attempting to jump to the next row and the row doesn't exist.
      **`false`** (default): Leave the table when attempting to jump to the next row and the row doesn't exist.

  - name: tables.auto_extend_cols
    type: boolean
    description: |
      `true`: Add another column when attempting to jump to the next column and the column doesn't exist.
      **`false`** (default): Go to the first cell of the next row when attempting to jump to the next column and the column doesn't exist.

  - name: tables.style.cell_padding
    type: integer
    description: |
      **`1`** (default): Use one space as padding at the beginning and end of each cell.
      `<n>`: Use `<n>` spaces as cell padding.

  - name: tables.style.separator_padding
    type: integer
    description: |
      **`1`** (default): Use one space as padding in the separator row.
      `<n>`: Use `<n>` spaces as padding in the separator row.

  - name: tables.style.outer_pipes
    type: boolean
    description: |
      **`true`** (default): Include outer pipes when formatting a table.
      `false`: Do not use outer pipes when formatting a table.

  - name: tables.style.apply_alignment
    type: boolean
    description: |
      **`true`** (default): Apply the cell alignment indicated in the separator row when formatting the table.
      `false`: Always visually left-align cell contents when formatting a table.
      Previously named `tables.style.mimic_alignment`.

backlinks:
  - name: backlinks.auto_refresh
    type: boolean
    description: |
      **`true`** (default): The backlinks panel automatically refreshes when you switch to a different buffer.
      `false`: The backlinks panel only updates when you manually run `:MkdnBacklinksRefresh` or re-toggle with `:MkdnBacklinks`.

yaml:
  - name: yaml.bib.override
    type: boolean
    description: |
      `true`: A bib path specified in a markdown file's yaml header should be the only source considered for bib references in that file.
      **`false`** (default): All known bib paths will be considered, whether specified in the yaml header or in your configuration settings.

mappings:
  - name: mappings.<command>
    type: "[string|string[], string]"
    description: |
      The first item is a string or an array of strings representing the mode(s) that the mapping should apply in (`'n'`, `'v'`, etc.). The second item is a string representing the mapping (in the expected format for vim).
