  # =====================================================================
  # INSTALLATION
  # =====================================================================
  - title: Installation
    tag: installation
    emoji: "💾"
    content:
      - type: prose
        text: |
          **Requirements**:

          * Linux, macOS, or Windows
          * Neovim >= 0.9.5 (tested on 0.9.5, 0.10.x, and stable)

          Install Mkdnflow using your preferred package manager for Neovim. Once installed,
          Mkdnflow is configured and initialized using a setup function.
      - type: collapsible
        summary: Install with Lazy
        content:
          - type: code
            language: lua
            code: |
              require('lazy').setup({
                  -- Your other plugins
                  {
                      'jakewvincent/mkdnflow.nvim',
                      ft = { 'markdown', 'rmd' },  -- Add custom filetypes here if configured
                      config = function()
                          require('mkdnflow').setup({
                              -- Your config
                          })
                      end
                  }
                  -- Your other plugins
              })
      - type: collapsible
        summary: Install with Vim-Plug
        content:
          - type: code
            language: vim
            code: |
              " Vim-Plug
              Plug 'jakewvincent/mkdnflow.nvim'

              " Include the setup function somewhere else in your init.vim file, or the
              " plugin won't activate itself:
              lua << EOF
              require('mkdnflow').setup({
                  -- Config goes here; leave blank for defaults
              })
              EOF

  # =====================================================================
  # CONFIGURATION (includes all config subsections)
  # =====================================================================
  - title: Configuration
    tag: configuration
    emoji: "⚙️"
    children:
      - title: Quick start
        tag: quickstart
        emoji: "⚡"
        content:
          - type: prose
            text: |
              Mkdnflow is configured and initialized using a setup function. To use
              the default settings, pass no arguments or an empty table to the setup function:
          - type: code
            language: lua
            code: |
              {
                  'jakewvincent/mkdnflow.nvim',
                  config = function()
                      require('mkdnflow').setup({})
                  end
              }

      - title: Advanced configuration and sample recipes
        tag: config-advanced
        emoji: "🔧"
        content:
          - type: prose
            text: |
              Most features are highly configurable. Study the default config first
              and read the documentation for the configuration options below or in
              the help files.
          - type: collapsible
            summary: "🔧 Complete default config"
            content:
              - type: default_config
        children:
          - title: Configuration options
            tag: config-options
            emoji: "🎨"
            children:
              - title: modules
                tag: config-modules
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          modules = {
                              bib = true,
                              buffers = true,
                              conceal = true,
                              cursor = true,
                              folds = true,
                              foldtext = true,
                              links = true,
                              lists = true,
                              maps = true,
                              paths = true,
                              tables = true,
                              to_do = true,
                              yaml = false,
                              cmp = false,
                          }
                      })
                  - type: config_table
                    ref: modules

              - title: create_dirs
                tag: config-create-dirs
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          create_dirs = true,
                      })
                  - type: config_table
                    ref: create_dirs

              - title: perspective
                tag: config-perspective
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          perspective = {
                              priority = 'first',
                              fallback = 'current',
                              root_tell = false,
                              nvim_wd_heel = false,
                              update = false,
                          },
                      })
                  - type: config_table
                    ref: perspective

              - title: filetypes
                tag: config-filetypes
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          filetypes = {
                              markdown = true,
                              rmd = true,
                          },
                      })
                  - type: config_table
                    ref: filetypes
                  - type: admonition
                    kind: note
                    content: |
                      Mkdnflow activates based on Neovim's filetype detection, not file extensions.
                      This means files with modelines like `vim: ft=markdown` will activate the plugin
                      regardless of their extension.

                      **Lazy loading note**: If you use a plugin manager with lazy loading (e.g., `ft = { 'markdown' }`)
                      and configure custom extensions like `wiki = true`, you must add those filetypes
                      to your lazy loading configuration (e.g., `ft = { 'markdown', 'wiki' }`), since the
                      plugin won't load until it sees a matching filetype.

              - title: wrap
                tag: config-wrap
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          wrap = false,
                      })
                  - type: config_table
                    ref: wrap

              - title: bib
                tag: config-bib
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          bib = {
                              default_path = nil,
                              find_in_root = true,
                          },
                      })
                  - type: config_table
                    ref: bib

              - title: silent
                tag: config-silent
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          silent = false,
                      })
                  - type: config_table
                    ref: silent

              - title: cursor
                tag: config-cursor
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          cursor = {
                              jump_patterns = nil,
                          },
                      })
                  - type: config_table
                    ref: cursor

              - title: links
                tag: config-links
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          links = {
                              style = 'markdown',
                              name_is_source = false,
                              conceal = false,
                              context = 0,
                              implicit_extension = nil,
                              transform_implicit = false,
                              transform_explicit = function(text)
                                  text = text:gsub(" ", "-")
                                  text = text:lower()
                                  text = os.date('%Y-%m-%d_') .. text
                                  return(text)
                              end,
                              create_on_follow_failure = true,
                          },
                      })
                  - type: config_table
                    ref: links
                  - type: collapsible
                    summary: Sample links recipes
                    content:
                      - type: code
                        language: lua
                        code: |
                          require('mkdnflow').setup({
                              links = {
                                  -- If you want all link paths to be explicitly prefixed with the year
                                  -- and for the path to be converted to uppercase:
                                  transform_explicit = function(input)
                                      return(string.upper(os.date('%Y-')..input))
                                  end,
                                  -- Link paths that match a date pattern can be opened in a `journals`
                                  -- subdirectory of your notebook, and all others can be opened in a
                                  -- `pages` subdirectory:
                                  transform_implicit = function(input)
                                      if input:match('%d%d%d%d%-%d%d%-%d%d') then
                                          return('journals/'..input)
                                      else
                                          return('pages/'..input)
                                      end
                                  end
                              }
                          })

              - title: new_file_template
                tag: config-new-file-template
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          new_file_template = {
                              use_template = false,
                              placeholders = {
                                  before = { title = 'link_title', date = 'os_date' },
                                  after = {},
                              },
                              template = '# {{ title }}',
                          },
                      })
                  - type: config_table
                    ref: new_file_template

              - title: to_do
                tag: config-to-do
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          to_do = {
                              highlight = false,
                              status_propagation = { up = true, down = true },
                              sort = {
                                  on_status_change = false,
                                  recursive = false,
                                  cursor_behavior = { track = true },
                              },
                              statuses = { ... },  -- See full default in docs
                          },
                      })
                  - type: config_table
                    ref: to_do
                  - type: admonition
                    kind: warning
                    content: |
                      The following to-do configuration options are deprecated. Please use the
                      `to_do.statuses` table instead. Continued support for these options is
                      temporarily provided by a compatibility layer that will be removed in the
                      near future.

                      * `to_do.symbols` - A list of markers representing to-do completion statuses
                      * `to_do.not_started` - Which marker represents a not-yet-started to-do
                      * `to_do.in_progress` - Which marker represents an in-progress to-do
                      * `to_do.complete` - Which marker represents a complete to-do
                      * `to_do.update_parents` - Whether parent to-dos' statuses should be updated

              - title: foldtext
                tag: config-foldtext
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          foldtext = {
                              object_count = true,
                              object_count_icon_set = 'emoji',
                              object_count_opts = function()
                                  return require('mkdnflow').foldtext.default_count_opts
                              end,
                              line_count = true,
                              line_percentage = true,
                              word_count = false,
                              title_transformer = function()
                                  return require('mkdnflow').foldtext.default_title_transformer
                              end,
                              fill_chars = {
                                  left_edge = '⢾⣿⣿',
                                  right_edge = '⣿⣿⡷',
                                  item_separator = ' · ',
                                  section_separator = ' ⣹⣿⣏ ',
                                  left_inside = ' ⣹',
                                  right_inside = '⣏ ',
                                  middle = '⣿',
                              },
                          },
                      })
                  - type: config_table
                    ref: foldtext
                  - type: collapsible
                    summary: Sample foldtext recipes
                    content:
                      - type: code
                        language: lua
                        code: |
                          -- SAMPLE FOLDTEXT CONFIGURATION RECIPE WITH COMMENTS
                          require('mkdnflow').setup({
                              foldtext = {
                                  title_transformer = function()
                                      local function my_title_transformer(text)
                                          local updated_title = text:gsub('%b{}', '')
                                          updated_title = updated_title:gsub('^%s*', '')
                                          updated_title = updated_title:gsub('%s*$', '')
                                          updated_title = updated_title:gsub('^######', '░░░░░▓')
                                          updated_title = updated_title:gsub('^#####', '░░░░▓▓')
                                          updated_title = updated_title:gsub('^####', '░░░▓▓▓')
                                          updated_title = updated_title:gsub('^###', '░░▓▓▓▓')
                                          updated_title = updated_title:gsub('^##', '░▓▓▓▓▓')
                                          updated_title = updated_title:gsub('^#', '▓▓▓▓▓▓')
                                          return updated_title
                                      end
                                      return my_title_transformer
                                  end,
                                  object_count_icon_set = 'nerdfont',
                                  object_count_opts = function()
                                      local opts = {
                                          link = false,
                                          blockquote = {
                                              icon = ' ',
                                              count_method = {
                                                  pattern = { '^>.+$' },
                                                  tally = 'blocks',
                                              }
                                          },
                                          fncblk = { icon = ' ' }
                                      }
                                      return opts
                                  end,
                                  line_count = false,
                                  word_count = true,
                                  fill_chars = {
                                      left_edge = '╾─🖿 ─',
                                      right_edge = '──╼',
                                      item_separator = ' · ',
                                      section_separator = ' // ',
                                      left_inside = ' ┝',
                                      right_inside = '┥ ',
                                      middle = '─',
                                  },
                              },
                          })
                      - type: prose
                        text: |
                          The above recipe will produce foldtext like the following
                          (for an h3-level section heading called `My section`):
                      - type: responsive_image
                        light: https://raw.githubusercontent.com/jakewvincent/mkdnflow.nvim/media/assets/foldtext/foldtext_ex.png
                        dark: https://raw.githubusercontent.com/jakewvincent/mkdnflow.nvim/media/assets/foldtext/foldtext_ex_dark.png
                        alt: Enhanced foldtext example
                        centered: true

              - title: tables
                tag: config-tables
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          tables = {
                              trim_whitespace = true,
                              format_on_move = true,
                              auto_extend_rows = false,
                              auto_extend_cols = false,
                              style = {
                                  cell_padding = 1,
                                  separator_padding = 1,
                                  outer_pipes = true,
                                  mimic_alignment = true,
                              },
                              line_breaks = {
                                  pandoc = true,
                                  html = false,
                              },
                          },
                      })
                  - type: config_table
                    ref: tables

              - title: yaml
                tag: config-yaml
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          yaml = {
                              bib = { override = false },
                          },
                      })
                  - type: config_table
                    ref: yaml

              - title: mappings
                tag: config-mappings
                content:
                  - type: code
                    language: lua
                    code: |
                      require('mkdnflow').setup({
                          mappings = {
                              MkdnEnter = { { 'n', 'v' }, '<CR>' },
                              MkdnGoBack = { 'n', '<BS>' },
                              MkdnGoForward = { 'n', '<Del>' },
                              MkdnMoveSource = { 'n', '<F2>' },
                              MkdnNextLink = { 'n', '<Tab>' },
                              MkdnPrevLink = { 'n', '<S-Tab>' },
                              MkdnFollowLink = false,
                              MkdnDestroyLink = { 'n', '<M-CR>' },
                              MkdnTagSpan = { 'v', '<M-CR>' },
                              MkdnYankAnchorLink = { 'n', 'yaa' },
                              MkdnYankFileAnchorLink = { 'n', 'yfa' },
                              MkdnNextHeading = { 'n', ']]' },
                              MkdnPrevHeading = { 'n', '[[' },
                              MkdnIncreaseHeading = { { 'n', 'v' }, '+' },
                              MkdnDecreaseHeading = { { 'n', 'v' }, '-' },
                              MkdnIncreaseHeadingOp = { { 'n', 'v' }, 'g+' },
                              MkdnDecreaseHeadingOp = { { 'n', 'v' }, 'g-' },
                              MkdnToggleToDo = { { 'n', 'v' }, '<C-Space>' },
                              MkdnNewListItem = false,
                              MkdnNewListItemBelowInsert = { 'n', 'o' },
                              MkdnNewListItemAboveInsert = { 'n', 'O' },
                              MkdnExtendList = false,
                              MkdnUpdateNumbering = { 'n', '<leader>nn' },
                              MkdnTableNextCell = { 'i', '<Tab>' },
                              MkdnTablePrevCell = { 'i', '<S-Tab>' },
                              MkdnTableNextRow = false,
                              MkdnTablePrevRow = { 'i', '<M-CR>' },
                              MkdnTableNewRowBelow = { 'n', '<leader>ir' },
                              MkdnTableNewRowAbove = { 'n', '<leader>iR' },
                              MkdnTableNewColAfter = { 'n', '<leader>ic' },
                              MkdnTableNewColBefore = { 'n', '<leader>iC' },
                              MkdnTableDeleteRow = { 'n', '<leader>dr' },
                              MkdnTableDeleteCol = { 'n', '<leader>dc' },
                              MkdnFoldSection = { 'n', '<leader>f' },
                              MkdnUnfoldSection = { 'n', '<leader>F' },
                              MkdnTab = false,
                              MkdnSTab = false,
                              MkdnCreateLink = false,
                              MkdnCreateLinkFromClipboard = { { 'n', 'v' }, '<leader>p' },
                          },
                      })
                  - type: prose
                    text: |
                      See descriptions of commands and mappings below.

                      **Note**: `<command>` should be the name of a command defined in
                      `mkdnflow.nvim/plugin/mkdnflow.lua` (see `:h Mkdnflow-commands` for a list).
                  - type: config_table
                    ref: mappings

          - title: Completion setup
            tag: completion-setup
            emoji: "🔮"
            content:
              - type: prose
                text: |
                  To enable completion via `cmp` using the provided source, add `mkdnflow` as a
                  source in your `cmp` setup function. You may also want to modify the formatting
                  to see which completions are coming from Mkdnflow:
              - type: code
                language: lua
                code: |
                  cmp.setup({
                      -- Add 'mkdnflow' as a completion source
                      sources = cmp.config.sources({
                          { name = 'mkdnflow' },
                      }),
                      -- Completion source attribution
                      formatting = {
                          format = function(entry, vim_item)
                              vim_item.menu = ({
                                  -- Other attributions
                                  mkdnflow = '[Mkdnflow]',
                              })[entry.source_name]
                              return vim_item
                          end
                      }
                  })
              - type: admonition
                kind: warning
                content: |
                  There may be some compatibility issues with the completion module and
                  `links.transform_explicit`/`links.transform_implicit` functions.

                  If you have some `transform_explicit` option for links to organizing in folders
                  then the folder name will be inserted accordingly. Some transformations may not
                  work as expected in completions.

                  To prevent this, make sure you write sensible transformation functions,
                  preferably using it for folder organization.

  # =====================================================================
  # COMMANDS & MAPPINGS
  # =====================================================================
  - title: Commands & mappings
    tag: commands
    emoji: "🛠️"
    content:
      - type: prose
        text: |
          Below are descriptions of the user commands defined by Mkdnflow. For the
          default mappings to these commands, see the `mappings = ...` section of
          Configuration options.
      - type: command_table
      - type: admonition
        kind: tip
        content: |
          If you are attempting to (re)map `<CR>` in insert mode but can't get it to
          work, try inspecting your current insert mode mappings and seeing if anything
          is overriding your mapping. Possible candidates are completion plugins and
          auto-pair plugins.

          If using nvim-cmp, consider using the mapping with a fallback.
          If using an autopair plugin that automatically maps `<CR>` (e.g. nvim-autopairs),
          see if it provides a way to disable its `<CR>` mapping.

  # =====================================================================
  # API
  # =====================================================================
  - title: API
    tag: api
    emoji: "📚"
    content:
      - type: prose
        text: |
          Mkdnflow provides a range of Lua functions that can be called directly to
          manipulate markdown files, navigate through buffers, manage links, and more.
          Below are the primary functions available:
      - type: list
        ordered: true
        items:
          - text: Initialization (see `initialization`)
          - text: Link management (see `linkmanagement`)
          - text: Link & path handling (see `linkpathhandling`)
          - text: Buffer navigation (see `buffernavigation`)
          - text: Cursor movement (see `cursormovement`)
          - text: Cursor-aware manipulations (see `cursorawaremanipulations`)
          - text: List management (see `listmanagement`)
          - text: To-do list management (see `todolistmanagement`)
