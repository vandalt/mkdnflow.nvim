# Command definitions
# Each command has: name, default_mapping (null for none), description, and optional notes
commands:
  - name: MkdnEnter
    default_mapping: null
    description: |
      Triggers a wrapper function which will (a) infer your editor mode, and then if in normal or visual mode, either follow a link, create a new link from the text under the cursor or visual selection, or fold a section (if cursor is on a section heading); if in insert mode, it will create a new list item (if cursor is in a list), go to the next row in a table (if cursor is in a table), or behave normally (if cursor is not in a list or a table). In visual mode, if the selection overlaps a citation (`@citekey` or `[@citekey]`), a markdown link is created from the citekey instead of following the citation.

      Note: There is no insert-mode mapping for this command by default since some may find its effects intrusive. To enable the insert-mode functionality, add to the mappings table: `MkdnEnter = {{'i', 'n', 'v'}, '<CR>'}`.

  - name: MkdnNextLink
    default_mapping: "{ 'n', '<Tab>' }"
    description: |
      Move cursor to the beginning of the next link (if there is a next link).

  - name: MkdnPrevLink
    default_mapping: "{ 'n', '<S-Tab>' }"
    description: |
      Move the cursor to the beginning of the previous link (if there is one).

  - name: MkdnNextHeading
    default_mapping: "{ 'n', ']]' }"
    description: |
      Move the cursor to the beginning of the next heading (if there is one).

  - name: MkdnPrevHeading
    default_mapping: "{ 'n', '[[' }"
    description: |
      Move the cursor to the beginning of the previous heading (if there is one).

  - name: MkdnGoBack
    default_mapping: "{ 'n', '<BS>' }"
    description: |
      Open the historically last-active buffer in the current window.

      Note: The back-end function for `:MkdnGoBack` (`require('mkdnflow').buffers.goBack()`) returns a boolean indicating the success of `goBack()`. This may be useful if you wish to remap `<BS>` such that when `goBack()` is unsuccessful, another function is performed.

  - name: MkdnGoForward
    default_mapping: "{ 'n', '<Del>' }"
    description: |
      Open the buffer that was historically navigated away from in the current window.

  - name: MkdnCreateLink
    default_mapping: null
    description: |
      Create a link from the text under the cursor (in normal mode) or from the visual selection (in visual mode). Accepts optional arguments to override the link style and/or transform scope, in any order: `:MkdnCreateLink wiki`, `:MkdnCreateLink filename`, or `:MkdnCreateLink wiki filename`. Abbreviations are accepted (e.g. `:MkdnCreateLink w f`).

  - name: MkdnCreateLinkFromClipboard
    default_mapping: "{ { 'n', 'v' }, '<leader>p' }"
    description: |
      Create a link, using the content from the system clipboard (e.g. a URL) as the source and the text under the cursor or visual selection as the link text. Accepts optional arguments to override the link style and/or transform scope, in any order: `:MkdnCreateLinkFromClipboard wiki filename`. Abbreviations are accepted (e.g. `:MkdnCreateLinkFromClipboard w f`).

  - name: MkdnCreateFootnote
    default_mapping: null
    description: |
      Create a footnote reference (`[^N]`) at the cursor position and a corresponding definition (`[^N]: `) at the end of the document. The reference is placed after the current word and any trailing punctuation (e.g., `word.[^1]` rather than `word[^1].`). The cursor jumps to the definition line in insert mode so the footnote text can be filled in immediately. After filling in the definition, use `MkdnFollowLink` (`<CR>`) on the definition to jump back to the reference (or use ` `` `/`''` via the jumplist).

      Auto-numbering increments from the highest existing numeric footnote label. An optional argument specifies an explicit string label instead (e.g., `:MkdnCreateFootnote myref` creates `[^myref]`).

      If no footnote definitions exist in the buffer and `footnotes.heading` is configured, the heading is appended to the end of the document before the definition. If definitions already exist, the new definition is placed after the last one.

  - name: MkdnRenumberFootnotes
    default_mapping: null
    description: |
      Renumber all footnote references and definitions in the current buffer so they form a sequential series (1, 2, 3, ...) based on order of first appearance in the document. Both references (`[^label]`) and definitions (`[^label]: ...`) are updated. String-labeled footnotes (e.g., `[^myref]`) are converted to numeric labels. Multiple references to the same footnote are all updated consistently.

      Definitions are consolidated under the configured `footnotes.heading` (default: `## Footnotes`) in appearance order. Multi-line definitions (with indented continuation lines) are moved as a block. If the heading doesn't exist, it is appended to the end of the document.

      Aborts with a warning if duplicate definitions are found (same label defined more than once). If footnotes are already up to date, a message is shown and no changes are made.

  - name: MkdnRefreshFootnotes
    default_mapping: null
    description: |
      Refresh footnote numbering and consolidate definitions. Like `MkdnRenumberFootnotes`, but only renumbers footnotes that already have numeric labels — string-labeled footnotes (e.g., `[^myref]`) are preserved as-is.

      Definitions are reordered by first appearance in the document and consolidated under the configured `footnotes.heading`. This is useful for documents that mix numbered and named footnotes, or for reordering a disorganized definition list.

      Aborts with a warning if duplicate definitions are found. If footnotes are already up to date, a message is shown and no changes are made.

  - name: MkdnFollowLink
    default_mapping: null
    description: |
      Open the link under the cursor, creating missing directories if desired, or if there is no link under the cursor, make a link from the text under the cursor. Image links (`![alt](path)`) are opened in the system's default viewer.

      For footnotes, this command jumps bidirectionally: pressing `<CR>` on a footnote reference (`[^1]`) jumps to its definition (`[^1]: ...`), and pressing `<CR>` on a definition jumps back to the reference.

  - name: MkdnDestroyLink
    default_mapping: "{ 'n', '<M-CR>' }"
    description: |
      Destroy the link under the cursor, replacing it with just the text from the link name.

  - name: MkdnTagSpan
    default_mapping: "{ 'v', '<M-CR>' }"
    description: |
      Tag a visually-selected span of text with an ID, allowing it to be linked to with an anchor link.

  - name: MkdnMoveSource
    default_mapping: "{ 'n', '<F2>' }"
    description: |
      Open a dialog where you can provide a new source for a link and the
      plugin will rename and move the associated file on the backend (and
      rename the link source). After the file is moved, the notebook is
      scanned for other files that reference the old path. If any are
      found, a quickfix list opens with proposed link updates. Use `a` to
      apply a change, `s` to skip, `A` to apply all, or `q` to quit.

  - name: "MkdnDeadLinks (notebook)"
    default_mapping: null
    description: |
      Scan for dead links — links whose target files do not exist on disk. Results are shown in a read-only quickfix list. Navigate with standard quickfix commands (`:cnext`, `:cprev`, `<CR>` to jump).

      Without arguments, checks only the current buffer. Pass `notebook` to scan all files in the notebook (requires the `notebook` module).

      Checked link types: markdown links (`[text](path)`), wiki links (`[[path]]`), image links (`![alt](path.png)`), and reference definitions (`[label]: path`). Image links and non-notebook extensions (`.pdf`, `.csv`, etc.) are checked for file existence.

      Skipped: URLs, citations (`@citekey`), same-file anchors (`#heading`), and links using registered `uri_handler` schemes.

  - name: MkdnBacklinks
    default_mapping: null
    description: |
      Toggle the backlinks panel, which shows all files in the notebook that contain links pointing to the current buffer's file. Press `<CR>` on a result line to jump to that location. The panel auto-refreshes when you switch buffers (configurable via `backlinks.auto_refresh`). Requires the `notebook` module.

  - name: MkdnBacklinksRefresh
    default_mapping: null
    description: |
      Force a refresh of the backlinks panel content. Useful when `backlinks.auto_refresh` is disabled or after editing files externally. The panel must already be open.

  - name: MkdnYankAnchorLink
    default_mapping: "{ 'n', 'yaa' }"
    description: |
      Yank a formatted anchor link (if cursor is currently on a line with a heading).

  - name: MkdnYankFileAnchorLink
    default_mapping: "{ 'n', 'yfa' }"
    description: |
      Yank a formatted anchor link with the file path included before the anchor (if cursor is currently on a line with a heading). The file path is relative to the notebook's path resolution base (root directory, initial directory, or current file directory, depending on `path_resolution` config).

  - name: MkdnIncreaseHeading
    default_mapping: "{ { 'n', 'v' }, '+' }"
    description: |
      Increase heading importance (remove hashes). Supports visual selection to change multiple headings at once. Visual mode supports dot-repeat (like Vim's `<` and `>`).

  - name: MkdnDecreaseHeading
    default_mapping: "{ { 'n', 'v' }, '-' }"
    description: |
      Decrease heading importance (add hashes). Supports visual selection to change multiple headings at once. Visual mode supports dot-repeat (like Vim's `<` and `>`).

  - name: MkdnIncreaseHeadingOp
    default_mapping: "{ { 'n', 'v' }, 'g+' }"
    description: |
      Operator version of MkdnIncreaseHeading. In normal mode, use with a motion (e.g., `g+}` to increase headings to next paragraph). In visual mode, operates on selection. Supports dot-repeat.

  - name: MkdnDecreaseHeadingOp
    default_mapping: "{ { 'n', 'v' }, 'g-' }"
    description: |
      Operator version of MkdnDecreaseHeading. In normal mode, use with a motion (e.g., `g-}` to decrease headings to next paragraph). In visual mode, operates on selection. Supports dot-repeat.

  - name: MkdnToggleToDo
    default_mapping: "{ { 'n', 'v' }, '<C-Space>' }"
    description: |
      Toggle to-do list item's completion status, convert a list item into a to-do list item, or convert a plain text line into a to-do list item. Block-level markdown structures (headings, blockquotes, tables, code fences, thematic breaks, HTML blocks) and lines inside fenced code blocks are not converted.

  - name: MkdnSortToDoList
    default_mapping: null
    description: |
      Sort the to-do list at the cursor position by status. Items are grouped by their status's `sort.section` value and positioned according to `sort.position`.

  - name: MkdnUpdateNumbering
    default_mapping: "{ 'n', '<leader>nn' }"
    description: |
      Update numbering for all siblings of the list item of the current line.

  - name: "MkdnChangeListType {type} (marker)"
    default_mapping: null
    description: |
      Change the type of a list. The `type` argument must be one of `ul` (unordered), `ol` (ordered), `ultd` (unordered to-do), or `oltd` (ordered to-do). An optional `marker` argument (`-`, `*`, or `+`) specifies which bullet character to use when converting to an unordered type. Defaults to `-`. Ignored for ordered types. When used with a marker on a list that is already the target type, the bullet character is swapped (e.g., `:MkdnChangeListType ul *` changes `-` bullets to `*`).

      Without a visual selection, changes all siblings at the cursor's indentation level. With a visual selection, changes all list items in the selected range.

      When converting to a to-do type, items receive a `not_started` checkbox. When converting from a to-do type to a plain type, checkboxes are removed. When converting between to-do types, the existing checkbox status is preserved.

  - name: MkdnNewListItem
    default_mapping: null
    description: |
      Add a new ordered list item, unordered list item, or (uncompleted) to-do list item. When adding a to-do item and `to_do.status_propagation.up` is enabled, ancestor to-do statuses are updated accordingly (e.g. a completed parent reverts to in-progress).

  - name: MkdnNewListItemBelowInsert
    default_mapping: "{ 'n', 'o' }"
    description: |
      Add a new list item below the current line and begin insert mode. Add a new line and enter insert mode when the cursor is not in a list.

  - name: MkdnNewListItemAboveInsert
    default_mapping: "{ 'n', 'O' }"
    description: |
      Add a new list item above the current line and begin insert mode. Add a new line and enter insert mode when the cursor is not in a list.

  - name: MkdnExtendList
    default_mapping: null
    description: |
      Like above, but the cursor stays on the current line (new list items of the same type are added below).

  - name: "MkdnTable ncol nrow (noh)"
    default_mapping: null
    description: |
      Make a table of `ncol` columns and `nrow` rows. Pass `noh` as a third argument to exclude table headers.

  - name: MkdnTableFormat
    default_mapping: null
    description: |
      Format a table under the cursor.

  - name: MkdnTableNextCell
    default_mapping: "{ 'i', '<Tab>' }"
    description: |
      Move the cursor to the beginning of the next cell in the table, jumping to the next row if needed.

  - name: MkdnTablePrevCell
    default_mapping: "{ 'i', '<S-Tab>' }"
    description: |
      Move the cursor to the beginning of the previous cell in the table, jumping to the previous row if needed.

  - name: MkdnTableCellNewLine
    default_mapping: "{ 'i', '<S-CR>' }"
    description: |
      Insert a new line within the current table cell. In grid tables, this adds a new content line within the current row. In pipe tables, this inserts a `<br>` tag at the cursor position.

  - name: MkdnTableNextRow
    default_mapping: null
    description: |
      Move the cursor to the beginning of the same cell in the next row of the table.

  - name: MkdnTablePrevRow
    default_mapping: "{ 'i', '<M-CR>' }"
    description: |
      Move the cursor to the beginning of the same cell in the previous row of the table.

  - name: MkdnTableNewRowBelow
    default_mapping: "{ 'n', '<leader>ir' }"
    description: |
      Add a new row below the row the cursor is currently in.

  - name: MkdnTableNewRowAbove
    default_mapping: "{ 'n', '<leader>iR' }"
    description: |
      Add a new row above the row the cursor is currently in.

  - name: MkdnTableNewColAfter
    default_mapping: "{ 'n', '<leader>ic' }"
    description: |
      Add a new column following the column the cursor is currently in.

  - name: MkdnTableNewColBefore
    default_mapping: "{ 'n', '<leader>iC' }"
    description: |
      Add a new column before the column the cursor is currently in.

  - name: MkdnTableDeleteRow
    default_mapping: "{ 'n', '<leader>dr' }"
    description: |
      Delete the row the cursor is currently in. Does nothing if cursor is on the separator row.

  - name: MkdnTableDeleteCol
    default_mapping: "{ 'n', '<leader>dc' }"
    description: |
      Delete the column the cursor is currently in. Does nothing if the table has only one column.

  - name: MkdnTableAlignLeft
    default_mapping: "{ 'n', '<leader>al' }"
    description: |
      Set the alignment of the current table column to left. Updates the separator row and reformats the table.

  - name: MkdnTableAlignRight
    default_mapping: "{ 'n', '<leader>ar' }"
    description: |
      Set the alignment of the current table column to right. Updates the separator row and reformats the table.

  - name: MkdnTableAlignCenter
    default_mapping: "{ 'n', '<leader>ac' }"
    description: |
      Set the alignment of the current table column to center. Updates the separator row and reformats the table.

  - name: MkdnTableAlignDefault
    default_mapping: "{ 'n', '<leader>ax' }"
    description: |
      Remove alignment from the current table column, returning it to the default. Updates the separator row and reformats the table.

  - name: "MkdnTablePaste (delimiter) (noh)"
    default_mapping: null
    description: |
      Paste delimited data from the system clipboard as a formatted markdown table. The delimiter is auto-detected by default (supports tab, comma, semicolon, and pipe), but can be specified explicitly as the first argument. Pass `noh` to suppress the header separator row. The table is inserted below the current cursor line.

  - name: "MkdnTableFromSelection (delimiter) (noh)"
    default_mapping: null
    description: |
      Convert visually-selected delimited lines into a formatted markdown table, replacing the selection. The delimiter is auto-detected by default, but can be specified explicitly. Pass `noh` to suppress the header separator row. Supports CSV, TSV, and other delimited formats including quoted fields.

  - name: MkdnIndentListItem
    default_mapping: "{ 'i', '<C-t>' }"
    description: |
      Indent the current list item and update numbering for ordered lists. Falls back to the default `<C-t>` behavior when the cursor is not on a list item.

  - name: MkdnDedentListItem
    default_mapping: "{ 'i', '<C-d>' }"
    description: |
      Dedent the current list item and update numbering for ordered lists. Falls back to the default `<C-d>` behavior when the cursor is not on a list item.

  - name: MkdnTab
    default_mapping: null
    description: |
      Wrapper function which will jump to the next cell in a table (if cursor is in a table) or indent an (empty) list item (if cursor is in a list item).

  - name: MkdnSTab
    default_mapping: null
    description: |
      Wrapper function which will jump to the previous cell in a table (if cursor is in a table) or de-indent an (empty) list item (if cursor is in a list item).

  - name: MkdnFoldSection
    default_mapping: "{ 'n', '<leader>f' }"
    description: |
      Fold the section the cursor is currently on/in.

  - name: MkdnUnfoldSection
    default_mapping: "{ 'n', '<leader>F' }"
    description: |
      Unfold the folded section the cursor is currently on.

  - name: MkdnCleanConfig
    default_mapping: null
    description: |
      Open a scratch buffer showing a minimal, optimized version of your Mkdnflow config. Deprecated key names are updated to their modern equivalents, and values matching defaults are removed. Function values cannot be serialized and are shown with a placeholder comment.

      See also `:checkhealth mkdnflow` for a diagnostic report on your configuration.

  - name: Mkdnflow
    default_mapping: null
    description: |
      Subcommand dispatcher for Mkdnflow. Provides a single entry point to all
      Mkdnflow functionality with tab completion at every level.

      Use `:Mkdnflow` with no arguments to see available command groups. Use
      `:Mkdnflow <group>` to see actions within a group. Use
      `:Mkdnflow <group> <action> [args]` to execute a command.

      Available groups: `link`, `nav`, `heading`, `todo`, `list`, `table`,
      `fold`, `yank`, `view`, `start`, `config`, `enter`, `tab`, `shift-tab`.

      Examples:

      - `:Mkdnflow link follow` — follow link under cursor
      - `:Mkdnflow table new 3 4` — create a 3-column, 4-row table
      - `:'<,'>Mkdnflow todo toggle` — toggle to-do status for visual selection
      - `:Mkdnflow link create wiki` — create a wiki-style link
      - `:Mkdnflow start` — force-start Mkdnflow on non-configured filetypes
      - `:Mkdnflow start silent` — force-start silently

      Note: The previous behavior of `:Mkdnflow` (force-start) has moved to
      `:Mkdnflow start`. The old usage still works but shows a deprecation
      warning.
